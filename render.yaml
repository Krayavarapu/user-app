# Render Blueprint — place this file at the root of the user-app Git repository.
# Render will find ./render.yaml by default (New → Blueprint → connect this repo).
#
# After first deploy, set Environment variables in the dashboard:
#   DATABASE_URL  — Neon Postgres URI (postgresql+psycopg2://...?sslmode=require)
#   OPENAI_API_KEY, OPENAI_MODEL (optional), PLAN_GENERATION_TIMEOUT_SECONDS (optional)
#   CORS_ORIGINS  — comma-separated frontend URLs (separate frontend repo / host)
#   LOG_LEVEL     — optional
#
# Local dev: use .env with SQLite; do not commit production secrets.

services:
  - type: web
    name: fitness-user-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
